<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐳 Whally Copilot - Crypto Manager</title>
  </head>
  <body>
    <script>
      (function () {
        var l = window.location;
        if (l.search && l.search.startsWith('?/')) {
          var path = l.search.slice(2);
          var newUrl = l.pathname.replace(/\/$/, '') + '/' + path + l.hash;
          window.history.replaceState(null, '', newUrl);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
